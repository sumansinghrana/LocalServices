kind = "web"
previewPath = "/"
title = "LocalServices.com"
version = "1.0.0"
id = "artifacts/local-services"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23669

[services.development]
run = "pnpm --filter @workspace/local-services run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/local-services", "run", "build" ]
publicDir = "artifacts/local-services/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23669"
BASE_PATH = "/"
