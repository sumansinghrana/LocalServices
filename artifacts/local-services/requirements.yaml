packages:
  "framer-motion": "For page transitions, smooth enter animations, and hover effects on cards"
  "react-hook-form": "For robust form state management and validation"
  "@hookform/resolvers": "Zod integration for form validation"
  "zod": "Schema definition for frontend forms"
  "date-fns": "For formatting dates in bookings and admin tables"
  "clsx": "Utility for constructing class names conditionally"
  "tailwind-merge": "Utility to merge tailwind classes safely"

images:
  - path: "artifacts/local-services/public/images/hero-bg.png"
    description: "A bright, warm, and inviting illustration of a diverse neighborhood in Dehradun with subtle mountains in the background, clean modern flat vector style, vibrant orange and teal accents"
    aspect_ratio: "16:9"
  - path: "artifacts/local-services/public/images/category-repairs.png"
    description: "3D stylized illustration of crossed wrench and screwdriver with subtle glowing sparks on a soft orange background"
    aspect_ratio: "1:1"
  - path: "artifacts/local-services/public/images/category-cleaning.png"
    description: "3D stylized illustration of a sparkling spray bottle and bubbles on a soft teal background"
    aspect_ratio: "1:1"
  - path: "artifacts/local-services/public/images/category-painting.png"
    description: "3D stylized illustration of a paint roller with a swoosh of vibrant color on a soft yellow background"
    aspect_ratio: "1:1"
  - path: "artifacts/local-services/public/images/category-pg.png"
    description: "3D stylized illustration of a cozy room with a bed and a plant on a soft purple background"
    aspect_ratio: "1:1"

notes:
  - Using generated hooks from @workspace/api-client-react
  - Forms use Zod schemas that mirror the OpenAPI definitions
