openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: LocalServices.com API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bookings
    description: Service booking operations
  - name: listings
    description: PG/Hostel listing operations
  - name: admin
    description: Admin panel operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bookings:
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a new service booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingInput"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listBookings
      tags: [admin, bookings]
      summary: List all bookings (admin)
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    delete:
      operationId: deleteBooking
      tags: [admin, bookings]
      summary: Delete a booking (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings:
    post:
      operationId: createListing
      tags: [listings]
      summary: Submit a new PG/Hostel listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateListingInput"
      responses:
        "201":
          description: Listing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listListings
      tags: [listings]
      summary: List all PG/Hostel listings with optional filters
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [pg, hostel, room]
        - name: minPrice
          in: query
          required: false
          schema:
            type: number
        - name: maxPrice
          in: query
          required: false
          schema:
            type: number
      responses:
        "200":
          description: List of listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"

  /listings/{id}:
    delete:
      operationId: deleteListing
      tags: [admin, listings]
      summary: Delete a listing (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vendor-submit:
    post:
      operationId: vendorSubmit
      tags: [listings]
      summary: Vendor submission - add service or room listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorSubmitInput"
      responses:
        "201":
          description: Submission received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vendor-submissions:
    get:
      operationId: listVendorSubmissions
      tags: [admin]
      summary: List all vendor submissions (admin)
      responses:
        "200":
          description: List of vendor submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VendorSubmission"

  /vendor-submissions/{id}:
    delete:
      operationId: deleteVendorSubmission
      tags: [admin]
      summary: Delete a vendor submission (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    CreateBookingInput:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        address:
          type: string
        service:
          type: string
        date:
          type: string
          format: date
      required:
        - name
        - phone
        - address
        - service
        - date

    Booking:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        address:
          type: string
        service:
          type: string
        date:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - phone
        - address
        - service
        - date
        - createdAt

    CreateListingInput:
      type: object
      properties:
        title:
          type: string
        type:
          type: string
          enum: [pg, hostel, room]
        price:
          type: number
        location:
          type: string
        contact:
          type: string
        description:
          type: string
        imageUrl:
          type: string
      required:
        - title
        - type
        - price
        - location
        - contact

    Listing:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
        price:
          type: number
        location:
          type: string
        contact:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        createdAt:
          type: string
      required:
        - id
        - title
        - type
        - price
        - location
        - contact
        - createdAt

    VendorSubmitInput:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        submissionType:
          type: string
          enum: [service, room]
        serviceCategory:
          type: string
        serviceDescription:
          type: string
        roomTitle:
          type: string
        roomPrice:
          type: number
        roomLocation:
          type: string
        roomType:
          type: string
          enum: [pg, hostel, room]
      required:
        - name
        - phone
        - submissionType

    VendorSubmission:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        submissionType:
          type: string
        serviceCategory:
          type: string
        serviceDescription:
          type: string
        roomTitle:
          type: string
        roomPrice:
          type: number
        roomLocation:
          type: string
        roomType:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - phone
        - submissionType
        - createdAt
